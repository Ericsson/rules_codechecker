# This file exists to have a micromamba
# environment without a fixed bazel version.
# This way the bazel version can be modified
# with commandline argument: bazel=<version_num>
name: ci
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pytest
  - pylint
  - pycodestyle
  - buildifier
  - clang=21
  - clang-tools=21
  - bazel
  - gcc
  - gxx
  - git
  - patch
  - pip:
    - codechecker==6.27.3
