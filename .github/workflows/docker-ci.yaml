name: docker-ci

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test"
        required: true
        type: choice
        options:
          - ubuntu
          - rhel9
          - all
        default: all
      bazel_version:
        description: "Bazel version to use (leave empty to use 7.7.0)"
        required: false
        type: string
        default: "7.7.0"

permissions: read-all

jobs:
  ubuntu:
    name: "Docker CI: Ubuntu"
    runs-on: ubuntu-24.04
    if: >
      inputs.platform == 'ubuntu' ||
      inputs.platform == 'all'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Ubuntu image
        run: |
          docker build \
            -t codechecker-bazel-ubuntu \
            -f .ci/docker/ubuntu/Dockerfile \
            .ci/docker/

      - name: Run tests in Ubuntu container
        run: |
          docker run --rm \
            ${BAZEL_VERSION:+-e BAZEL_VERSION="${BAZEL_VERSION}"} \
            -v "${{ github.workspace }}:/workspace" \
            codechecker-bazel-ubuntu
        env:
          BAZEL_VERSION: ${{ inputs.bazel_version }}

  rhel9:
    name: "Docker CI: RHEL9"
    runs-on: ubuntu-24.04
    if: >
      inputs.platform == 'rhel9' ||
      inputs.platform == 'all'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build RHEL9 image
        run: |
          docker build \
            -t codechecker-bazel-rhel9 \
            -f .ci/docker/rhel9/Dockerfile \
            .ci/docker

      - name: Run tests in RHEL9 container
        run: |
          docker run --rm \
            ${BAZEL_VERSION:+-e BAZEL_VERSION="${BAZEL_VERSION}"} \
            -v "${{ github.workspace }}:/workspace" \
            codechecker-bazel-rhel9
        env:
          BAZEL_VERSION: ${{ inputs.bazel_version }}
