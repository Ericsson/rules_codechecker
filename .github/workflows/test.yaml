name: rules-codechecker-tests

# Triggers the workflow on push or pull request events.
on:
  push:
    paths-ignore:
      - "**/*.md"
      - "README*"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "README*"
      - "LICENSE"


permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu_test:
    name: "Tests: Bazel ${{ matrix.bazel_version }} (Ubuntu)"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        bazel_version:
          - "7.7.1"
          - "8.5.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set bazel version to ${{ matrix.bazel_version }}
        run: echo "${{ matrix.bazel_version }}" > .bazelversion
        shell: bash

      # I did not use our setup script to leverage
      # the power of caching provided by this action.
      - name: Setup environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: ci
          environment-file: .ci/micromamba/ci.yaml
          create-args: >-
            bazel=${{ matrix.bazel_version }}
          cache-environment: true
          init-shell: bash
          condarc: |
            channels:
              - conda-forge

      - name: Print versions
        run: |
          bazel version
          CodeChecker version
          echo "[NOTE]: CodeChecker may find different analyzer binaries" \
               "when invoking directly, or in bazel's sandbox environment!" \
               "Be sure to double check during debugging."
          CodeChecker analyzers
        shell: bash -el {0}

      - name: Run lint tests
        run: |
          pylint .
          bazel test //:buildifier --test_output=all
        shell: bash -el {0}

      # Splitting unit and FOSS tests, since unit tests fail faster.
      # Therefore: less wasted CI runtime.
      - name: Run unit tests
        run: |
          bazel test //...
          pytest test/unit ${{ runner.debug == '1' && '--log-cli-level=DEBUG' || '' }}
        shell: bash -el {0}

      - name: Run Open Source tests
        run: pytest test/foss ${{ runner.debug == '1' && '--log-cli-level=DEBUG' || '' }}
        shell: bash -el {0}

  rhel9_test:
    name: "Tests: Bazel ${{ matrix.bazel_version }} (RHEL9)"
    runs-on: ubuntu-24.04
    container:
      image: redhat/ubi9:latest
      options: --init
    strategy:
      fail-fast: false
      matrix:
        bazel_version:
          - "7.7.1"
          - "8.5.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set bazel version to ${{ matrix.bazel_version }}
        run: echo "${{ matrix.bazel_version }}" > .bazelversion
        shell: bash

      - name: Setup environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: ci
          environment-file: .ci/micromamba/ci.yaml
          create-args: >-
            bazel=${{ matrix.bazel_version }}
          cache-environment: true
          init-shell: bash
          condarc: |
            channels:
              - conda-forge

      - name: Create a non-root user
        run: |
          useradd -m test
          chown -R test:test $GITHUB_WORKSPACE
          chown -R test:test $HOME
          chown -R test:test $MAMBA_ROOT_PREFIX
        shell: bash -el {0}

      - name: Print versions
        run: |
          runuser -u test -- bazel version
          CodeChecker version
          echo "[NOTE]: CodeChecker may find different analyzer binaries" \
               "when invoking directly, or in bazel's sandbox environment!" \
               "Be sure to double check during debugging."
          CodeChecker analyzers
        shell: bash -el {0}

      - name: Run lint tests
        run: |
          pylint .
          runuser -u test -- bazel test //:buildifier --test_output=all
        shell: bash -el {0}

      # Splitting unit and FOSS tests, since unit tests fail faster.
      # Therefore: less wasted CI runtime.
      - name: Run unit tests
        run: |
          runuser -u test -- bazel test //...
          runuser -u test -- pytest test/unit ${{ runner.debug == '1' && '--log-cli-level=DEBUG' || '' }}
        shell: bash -el {0}

      - name: Run Open Source tests
        run: runuser -u test -- pytest test/foss ${{ runner.debug == '1' && '--log-cli-level=DEBUG' || '' }}
        shell: bash -el {0}

